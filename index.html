<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tesla Cybertruck</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1e1e1e);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: min(90%, 900px);
      background: #161616;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      text-align: center;
    }
    .logo {
      width: 70px;
      height: 70px;
      margin: 0 auto 20px;
      border: 2px solid #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    p {
      font-size: 1.1rem;
      color: #cfcfcf;
      max-width: 650px;
      margin: 0 auto 28px;
      line-height: 1.6;
    }
    .truck {
      width: 100%;
      max-width: 700px;
      margin: 0 auto 30px;
      display: block;
      filter: drop-shadow(0 12px 30px rgba(255,255,255,0.08));
    }
    .button {
      display: inline-block;
      padding: 14px 26px;
      border-radius: 12px;
      background: white;
      color: black;
      text-decoration: none;
      font-weight: bold;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="logo">T</div>
    <h1>Cybertruck</h1>
    <p>
      Una página web simple inspirada en el Tesla Cybertruck, con un diseño moderno,
      oscuro y minimalista.
    </p>

    <svg class="truck" viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="120,190 280,110 520,110 650,160 720,160 735,210 100,210" fill="#cfcfcf" stroke="#ffffff" stroke-width="4"/>
      <line x1="280" y1="110" x2="360" y2="190" stroke="#ffffff" stroke-width="4"/>
      <line x1="520" y1="110" x2="570" y2="160" stroke="#ffffff" stroke-width="4"/>
      <circle cx="240" cy="220" r="38" fill="#111" stroke="#fff" stroke-width="4"/>
      <circle cx="610" cy="220" r="38" fill="#111" stroke="#fff" stroke-width="4"/>
      <rect x="370" y="125" width="120" height="40" fill="#7fd6ff" opacity="0.65"/>
    </svg>

    <div style="margin-top:20px">
      <h2 style="margin-bottom:10px">Tesla Cybertruck</h2>
      <p style="font-size:1.4rem; font-weight:bold; margin-bottom:15px">Precio: 79.990€</p>
      <a class="button" href="https://www.tesla.com/cybertruck" target="_blank">Comprar ahora</a>
    </div>
  </section>
</body>
</html>
